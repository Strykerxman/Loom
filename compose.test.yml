services:
  db_test:
    image: postgres:17-alpine
    container_name: loom_postgres_test
    environment:
      POSTGRES_USER: loom_test
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required for test Postgres}
      POSTGRES_DB: loom_test_db
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_test_data:
    driver: local
