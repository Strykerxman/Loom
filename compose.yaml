services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: loom-app
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=2).read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  db:
    image: postgres:17-alpine
    env_file:
      - .env.docker
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - app-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: loom-app
    env_file:
      - .env.docker
    command: ["python", "-m", "app.worker"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge