services:
     db:
       image: postgres:15-alpine
       container_name: loom_postgres
       environment:
         POSTGRES_USER: loom_user
         POSTGRES_PASSWORD: loom_password
         POSTGRES_DB: loom_db
       ports:
         - "5432:5432"
       volumes:
         - postgres_data:/var/lib/postgresql/data

volumes:
     postgres_data: